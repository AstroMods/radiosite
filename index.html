<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vantix Radio</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png"
        href="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="player-card">

    <div class="live-badge">
        🔴 LIVE 24/7
    </div>

    <!-- Station Logo -->
    <img
        class="station-logo"
        src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
        alt="Vantix Radio Logo"
    >

    <h1>Vantix Radio</h1>

    <p class="subtitle">
        The Official Radio Station of Andreas Initiative Roleplay
    </p>

    <!-- Hidden Audio Player -->
    <audio id="radioPlayer" preload="none">
        <source src="http://51.255.235.165:2128/stream.mp3" type="audio/mpeg">
    </audio>

    <div class="status" id="status">
        Click anywhere to start listening
    </div>

    <div class="volume-section">
        <label for="volumeSlider">Volume</label>

        <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
        >
    </div>

    <a
        class="discord-btn"
        href="https://discord.com/invite/YaaEnHTSvk"
        target="_blank"
        rel="noopener noreferrer"
    >
        Join Discord
    </a>

</div>

<script>
const player = document.getElementById("radioPlayer");
const volumeSlider = document.getElementById("volumeSlider");
const status = document.getElementById("status");

player.volume = 1;

volumeSlider.addEventListener("input", () => {
    player.volume = volumeSlider.value;
});

let started = false;

document.addEventListener("click", async () => {
    if (started) return;

    started = true;

    try {
        await player.play();
        status.textContent = "🔴 Live Now Playing";
    } catch (error) {
        console.error(error);
        status.textContent = "Unable to connect to stream";
    }
}, { once: true });

player.addEventListener("error", () => {
    status.textContent = "Stream Offline";
});
</script>

</body>
</html>
