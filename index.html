<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Radio</title>

    <link rel="icon" type="image/png"
        href="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="radio-layout">

    <!-- LEFT PANEL -->
    <div class="side-panel">

        <h2>Recent Tracks</h2>

        <div
            class="cc_recenttracks_list"
            data-username="vantixradio">
            Loading ...
        </div>

    </div>

    <!-- CENTER PLAYER -->
    <div class="player-card">

        <div class="live-badge">
            <span class="live-dot"></span>
            LIVE 24/7
        </div>

        <img
            class="station-logo"
            src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
            alt="Vantix Radio Logo"
        >

        <h1>Vantix Radio</h1>

        <p class="subtitle">
            The Official Radio Station of Andreas Initiative Roleplay
        </p>

        <audio
            id="radioPlayer"
            controls
            preload="none">
            <source
                src="http://51.255.235.165:2128/stream.mp3"
                type="audio/mpeg">
        </audio>

        <div id="status" class="status">
            Ready to Play
        </div>

        <div class="volume-section">

            <label for="volumeSlider">
                Volume
                <span id="volumeValue">100%</span>
            </label>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1">

        </div>

        <a
            class="discord-btn"
            href="http://radio.vantixurbex.shop/discord"
            target="_blank">
            Join Discord
        </a>

    </div>

    <!-- RIGHT PANEL -->
    <div class="side-panel">

        <h2>Request a Song</h2>

        <form
            class="cc_request_form"
            data-username="vantixradio">

            <div data-type="result"></div>

            Song artist:
            <input
                type="text"
                name="request[artist]"
                maxlength="127">

            Song title:
            <input
                type="text"
                name="request[title]"
                maxlength="127">

            Dedicated to:
            <input
                type="text"
                name="request[dedication]"
                maxlength="127">

            Your name:
            <input
                type="text"
                name="request[sender]"
                maxlength="127">

            Your E-mail:
            <input
                type="text"
                name="request[email]"
                maxlength="127">

            <input
                type="button"
                value="Submit Song Request"
                data-type="submit">

        </form>

    </div>

</div>

<script>
const player = document.getElementById("radioPlayer");
const volumeSlider = document.getElementById("volumeSlider");
const volumeValue = document.getElementById("volumeValue");
const status = document.getElementById("status");

player.volume = 1;

volumeSlider.addEventListener("input", () => {
    player.volume = volumeSlider.value;
    volumeValue.textContent =
        Math.round(volumeSlider.value * 100) + "%";
});

player.addEventListener("play", () => {
    status.textContent = "🔴 Live Now Playing";
});

player.addEventListener("pause", () => {
    status.textContent = "Paused";
});

player.addEventListener("error", () => {
    status.textContent = "Stream Offline";
});

player.addEventListener("waiting", () => {
    status.textContent = "Buffering...";
});
</script>

<!-- FastCast4U / Centova Cast Widgets -->
<script src="https://eu8.fastcast4u.com/system/streaminfo.js"></script>

</body>
</html>
