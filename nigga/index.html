<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MYRO.EXE</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #1a1a2e, #000);
        color: #ff4fd8;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .box {
        text-align: center;
        padding: 30px;
        border: 2px solid #ff4fd8;
        border-radius: 12px;
        background: rgba(0,0,0,0.7);
        box-shadow: 0 0 25px #ff4fd8;
        width: 320px;
    }

    h1 {
        font-size: 42px;
        margin: 0;
        text-shadow: 0 0 10px #ff4fd8;
        animation: glitch 1.2s infinite;
    }

    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(2px, -1px); }
        60% { transform: translate(-1px, -2px); }
        80% { transform: translate(1px, 2px); }
        100% { transform: translate(0); }
    }

    p {
        color: #fff;
        font-size: 14px;
        margin-top: 10px;
    }

    button {
        margin-top: 15px;
        padding: 10px 18px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        background: #ff4fd8;
        color: black;
        border-radius: 6px;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.1);
        background: #ff7ae6;
    }

    #msg {
        margin-top: 15px;
        min-height: 20px;
        color: #fff;
        font-size: 13px;
    }

    .face {
        font-size: 50px;
        animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
</style>
</head>

<body>

<div class="box">
    <div class="face">😎</div>
    <h1>MYRO.EXE</h1>
    <p>Warning: This user has too much main character energy.</p>

    <button onclick="summonMyro()">Summon Myro</button>

    <div id="msg"></div>
</div>

<script>
function summonMyro() {
    const lines = [
        "Myro has spawned... instantly forgot why.",
        "Loading Myro.exe... 404 confidence not found.",
        "Myro entered the chat and caused mild chaos.",
        "Error: Myro is too iconic for this system.",
        "Myro tried to act normal... failed successfully."
    ];

    document.getElementById("msg").innerText =
        lines[Math.floor(Math.random() * lines.length)];

    document.body.style.filter = `hue-rotate(${Math.random()*360}deg)`;
}
</script>

</body>
</html>
