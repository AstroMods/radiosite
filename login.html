<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vantix Admin Login</title>

    <link
        rel="icon"
        href="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
    >

    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_cGxlYXNhbnQtbW9uaXRvci03My5jbGVyay5hY2NvdW50cy5kZXYk"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;

            background:
                linear-gradient(
                    -45deg,
                    #0ea5e9,
                    #2563eb,
                    #7c3aed,
                    #f97316,
                    #dc2626
                );

            background-size:400% 400%;
            animation:gradientShift 15s ease infinite;
        }

        .card{
            width:450px;
            max-width:90%;

            padding:35px;

            border-radius:25px;

            background:rgba(15,23,42,.75);

            backdrop-filter:blur(25px);

            text-align:center;

            border:1px solid rgba(255,255,255,.1);

            box-shadow:
                0 15px 50px rgba(0,0,0,.35);
        }

        .logo{
            width:180px;
            margin-bottom:20px;
        }

        h1{
            color:white;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
        }

        #clerk-container{
            display:flex;
            justify-content:center;
        }

        @keyframes gradientShift{
            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <img
            class="logo"
            src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
            alt="Vantix Radio"
        >

        <h1>Admin Login</h1>

        <p>
            Sign in to access the Vantix Radio Admin Panel.
        </p>

        <div id="clerk-container"></div>

    </div>

    <script>
        window.addEventListener("load", async () => {

            await Clerk.load();

            if (Clerk.user) {
                window.location.href = "admin.html";
                return;
            }

            Clerk.mountSignIn(
                document.getElementById(
                    "clerk-container"
                )
            );

        });
    </script>

</body>
</html>
