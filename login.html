<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vantix Radio Admin Login</title>

<link rel="icon"
    href="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, Arial, sans-serif;

    background:linear-gradient(-45deg,#0ea5e9,#2563eb,#7c3aed,#f97316,#dc2626);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}

.card{
    width:420px;
    max-width:90%;

    background:rgba(15,23,42,.75);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;

    padding:35px;
    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.logo{
    width:160px;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
    color:white;
}

p{
    color:#cbd5e1;
    margin-bottom:20px;
}

.discord-btn{
    display:inline-block;
    padding:12px 18px;

    background:#5865F2;
    color:white;

    border-radius:12px;
    text-decoration:none;

    font-weight:700;

    transition:.2s ease;
}

.discord-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(88,101,242,.5);
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
</style>

</head>

<body>

<div class="card">

    <img class="logo"
        src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
        alt="Vantix Radio">

    <h1>Admin Login</h1>

    <p>Sign in with Discord to access the admin panel.</p>

    <!-- DISCORD OAUTH BUTTON -->
    <a id="loginBtn" class="discord-btn">
        Login with Discord
    </a>

</div>

<script>
/*
⚠️ YOU MUST REPLACE THESE:
*/
const CLIENT_ID = "YOUR_DISCORD_CLIENT_ID";
const REDIRECT_URI = "https://radio.vantixurbex.shop/auth/callback.html";

const OAUTH_URL =
    `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}` +
    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
    `&response_type=code&scope=identify`;

document.getElementById("loginBtn").href = OAUTH_URL;
</script>

</body>
</html>
