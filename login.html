<body>

<div class="card">
    <h1>Admin Login</h1>

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>
</div>

<script>
const encodedPassword = "Rm9ydG5pdGVHYW1lcjE2IQ==";

function login() {
    const entered =
        document.getElementById("password").value;

    if (btoa(entered) === encodedPassword) {
        sessionStorage.setItem(
            "vantix_admin",
            "true"
        );

        window.location.href =
            "admin-panel.html";
    } else {
        alert("Incorrect password");
    }
}
</script>
