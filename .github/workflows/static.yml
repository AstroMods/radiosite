name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Pages
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Upload your static site (root folder)
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # <-- your HTML/CSS/JS root folder

      # Deploy
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
