name: Scan & Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ FIX: explicitly use Node 20 (removes GitHub warning)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- HTML check ---
      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Scan HTML
        run: htmlhint "**/*.html"

      # --- CSS check ---
      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create stylelint config
        run: |
          echo '{
            "extends": "stylelint-config-standard"
          }' > .stylelintrc.json

      - name: Scan CSS
        run: stylelint "**/*.css"

      # --- JS check ---
      - name: Install eslint
        run: npm install -g eslint

      - name: Init ESLint config
        run: |
          echo '{
            "env": { "browser": true, "es2021": true },
            "extends": "eslint:recommended",
            "parserOptions": { "ecmaVersion": "latest" }
          }' > .eslintrc.json

      - name: Scan JS
        run: eslint "**/*.js"

  deploy:
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (optional but keeps environments consistent)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4
