name: Scan & Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # faster + removes node warnings
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # install once (faster than multiple installs)
      - name: Install linters
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard eslint

      - name: HTML scan
        run: htmlhint "**/*.html"

      - name: CSS scan
        run: |
          echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json
          stylelint "**/*.css"

      - name: JS scan
        run: |
          echo '{"env":{"browser":true,"es2021":true},"extends":"eslint:recommended","parserOptions":{"ecmaVersion":"latest"}}' > .eslintrc.json
          eslint "**/*.js"

  deploy:
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 🚀 IMPORTANT SPEED FIX: only deploy what matters
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # change this to / if your site is index.html only OR /dist if you build

      - name: Deploy
        uses: actions/deploy-pages@v4
