<div class="vr-mini-player">

    <div class="vr-live">
        <span class="vr-dot"></span>
        LIVE
    </div>

    <img
        class="vr-art"
        src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
        alt="Vantix Radio">

    <div class="vr-info">

        <div class="vr-station">
            Vantix Radio
        </div>

        <div
            class="vr-song"
            id="miniSong">

            Loading...

        </div>

        <div
            class="vr-artist"
            id="miniArtist">

            Please wait

        </div>

    </div>

    <button
        id="miniPlay"
        class="vr-play">

        <i class="fa-solid fa-play"></i>

    </button>

    <a
        href="/"
        class="vr-open">

        Open Player

    </a>

</div>

<audio
    id="miniAudio"
    preload="none"
    src="https://eu8.fastcast4u.com/proxy/vantixradio/stream">
</audio>
