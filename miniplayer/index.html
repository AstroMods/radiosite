<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vantix Radio Player</title>

<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="vr-mini-player">

    <!-- PLAY BUTTON -->
    <button class="vr-play" id="miniPlay">
        <i class="fa-solid fa-play"></i>
    </button>

    <!-- VOLUME -->
    <div class="vr-volume">
        <i class="fa-solid fa-volume-high"></i>
        <input
            id="miniVolume"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="1">
    </div>

</div>

<audio
    id="miniAudio"
    preload="none"
    src="https://eu8.fastcast4u.com/proxy/vantixradio/stream">
</audio>

<script src="app.js"></script>

</body>
</html>
