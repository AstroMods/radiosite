<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Vantix Radio Mini Player</title>

<link
    rel="stylesheet"
    href="app.css">

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="vr-mini-player">

    <div class="vr-live">
        <span class="vr-dot"></span>
        LIVE
    </div>

    <img
        class="vr-art"
        src="https://i.ibb.co/G4YSyXFc/Chat-GPT-Image-Jun-29-2026-12-47-34-PM.png"
        alt="Vantix Radio Logo">

    <div class="vr-info">

        <div class="vr-station">

            Vantix Radio

        </div>

        <div
            class="vr-song"
            id="miniSong">

            Loading...

        </div>

        <div
            class="vr-artist"
            id="miniArtist">

            Please wait...

        </div>

    </div>

    <button
        class="vr-play"
        id="miniPlay">

        <i class="fa-solid fa-play"></i>

    </button>

    <a
        href="/"
        class="vr-open">

        Open Player

    </a>

</div>

<audio
    id="miniAudio"
    preload="none"
    src="https://eu8.fastcast4u.com/proxy/vantixradio/stream">
</audio>

<script src="app.js"></script>

</body>

</html>
