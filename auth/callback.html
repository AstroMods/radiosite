<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Authenticating...</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.card{
    text-align:center;
    padding:30px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    backdrop-filter:blur(10px);
}

.loader{
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.2);
    border-top:4px solid #5865F2;
    border-radius:50%;
    margin:0 auto 15px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
    <div class="loader"></div>
    <h2>Authenticating Discord...</h2>
    <p>Please wait</p>
</div>

<script>
const CLIENT_ID = "YOUR_CLIENT_ID";
const CLIENT_SECRET = "YOUR_CLIENT_SECRET"; // ⚠️ NEVER expose in real frontend (use backend!)
const REDIRECT_URI = "https://radio.vantixurbex.shop/auth/callback.html";

// Get code from URL
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if (!code) {
    document.body.innerHTML = "<h2>Missing OAuth Code</h2>";
    throw new Error("No code");
}

// 🔥 Send to backend (YOU MUST CREATE THIS)
async function exchangeCode() {
    try {
        const res = await fetch("/api/discord-exchange", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                redirect_uri: REDIRECT_URI
            })
        });

        const data = await res.json();

        if (!data || !data.user) {
            throw new Error("Auth failed");
        }

        // Save session (simple client-side session)
        localStorage.setItem("vantix_user", JSON.stringify(data.user));

        // Redirect to admin panel
        window.location.href = "/admin-panel.html";

    } catch (err) {
        console.error(err);
        document.body.innerHTML =
            "<h2>Authentication Failed</h2><p>Check backend</p>";
    }
}

exchangeCode();
</script>

</body>
</html>
